<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Work Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">📚 Student Work Showcase</div>
  </header>

  <section class="hero">
    <h1>Celebrating Student Creativity</h1>
    <p>Browse approved student projects from different subjects.</p>
  </section>

<section class="controls">

  <input type="text" id="searchBox" placeholder="Search projects..." />

  <div class="subject-buttons">
    <button class="filter-btn active" data-subject="all">All</button>
    <button class="filter-btn" data-subject="English">English</button>
    <button class="filter-btn" data-subject="Math">Math</button>
    <button class="filter-btn" data-subject="Science">Science</button>
    <button class="filter-btn" data-subject="Chinese">Chinese</button>
    <button class="filter-btn" data-subject="Thai">Thai</button>
    <button class="filter-btn" data-subject="ICT">ICT</button>
    <button class="filter-btn" data-subject="Music">Music</button>
    <button class="filter-btn" data-subject="Art">Art</button>
    <button class="filter-btn" data-subject="Drama">Drama</button>
    <button class="filter-btn" data-subject="Social Studies">Social Studies</button>
  </div>

</section>

  <section class="highlights">
    <h2>⭐ Featured Highlights</h2>
    <div id="highlightContainer" class="highlight-grid"></div>
  </section>

  <section class="gallery-section">
    <h2>Approved Student Works</h2>
    <div id="gallery" class="gallery"></div>
  </section>

  <footer>
    <p>© 2026 Student Work Showcase Platform</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
