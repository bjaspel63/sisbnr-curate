<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Work Showcase</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <header>
    <div class="logo">📚 Student Work Showcase</div>

    <nav>
      <a href="index.html">Gallery</a>
      <a href="teacher.html">Teacher Upload</a>
      <a href="admin.html">Admin Panel</a>
    </nav>
  </header>

  <section class="hero">
    <h1>Celebrating Student Creativity</h1>
    <p>Browse approved student projects from different subjects.</p>
  </section>

  <section class="controls">
    <input type="text" id="searchBox" placeholder="Search projects..." />

    <select id="subjectFilter">
      <option value="all">All Subjects</option>
      <option value="Math">Math</option>
      <option value="Science">Science</option>
      <option value="English">English</option>
      <option value="ICT">ICT</option>
      <option value="Art">Art</option>
      <option value="History">History</option>
    </select>
  </section>

  <section class="highlights">
    <h2>⭐ Featured Highlights</h2>
    <div id="highlightContainer" class="highlight-grid"></div>
  </section>

  <section class="gallery-section">
    <h2>Approved Student Works</h2>
    <div id="gallery" class="gallery"></div>
  </section>

  <footer>
    <p>© 2026 Student Work Showcase Platform</p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
