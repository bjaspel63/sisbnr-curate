<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Teacher Upload Portal</title>

  <link rel="stylesheet" href="style.css">
</head>

<body>

  <header>

    <div class="logo">
      📚 Student Work Upload
    </div>

  </header>

  <section class="upload-container">

    <h1>Upload Student Work</h1>

    <form id="uploadForm">

      <!-- TITLE -->

      <input
        type="text"
        id="projectTitle"
        placeholder="Project Title"
        required
      >

      <!-- DESCRIPTION -->

      <textarea
        id="description"
        placeholder="Project Description"
        required
      ></textarea>

      <!-- CLASS -->

      <select id="studentClass" required>

        <option value="">
          Select Class
        </option>

        <option>P1 Hope</option>
        <option>P1 Love</option>
        <option>P1 Peace</option>
        <option>P1 Joy</option>

        <option>P2 Love</option>
        <option>P2 Joy</option>
        <option>P2 Peace</option>

        <option>P3 Joy</option>
        <option>P3 Love</option>
        <option>P3 Peace</option>

        <option>P4 Love</option>
        <option>P4 Joy</option>

        <option>P5 Joy</option>
        <option>P5 Love</option>

        <option>P6 Joy</option>
        <option>P6 Love</option>

      </select>

      <!-- SUBJECT -->

      <select id="subject" required>

        <option value="">
          Select Subject
        </option>

        <option>English</option>
        <option>Math</option>
        <option>Science</option>
        <option>Chinese</option>
        <option>Thai</option>
        <option>ICT</option>
        <option>Music</option>
        <option>Art</option>
        <option>Drama</option>
        <option>Social Studies</option>

      </select>

      <!-- TAGGED NAME -->

      <input
        type="text"
        id="taggedName"
        placeholder="Tagged Student Name"
        required
      >

      <!-- TEACHER NAME -->

      <input
        type="text"
        id="teacherName"
        placeholder="Teacher Name"
        required
      >

      <!-- FILE UPLOAD -->

      <label class="upload-label">
        Upload Images, Videos, or PDFs
      </label>

      <input
        type="file"
        id="mediaUpload"
        multiple
        accept="image/*,video/*,.pdf"
      >

      <!-- OPTIONAL LINK -->

      <input
        type="url"
        id="projectLink"
        placeholder="Optional Project Link"
      >

      <!-- SUBMIT -->

      <button type="submit">
        Upload for Approval
      </button>

    </form>

    <div class="notice">
      Uploaded student work will wait for admin approval before appearing publicly.
    </div>

  </section>

  <script src="teacher.js"></script>

</body>

</html>
