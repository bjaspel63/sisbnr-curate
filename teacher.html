<section class="upload-container">

  <h1>Upload Student Work</h1>

  <form id="uploadForm">

    <input
      type="text"
      id="projectTitle"
      placeholder="Project Title"
      required
    >

    <textarea
      id="description"
      placeholder="Project Description"
      required
    ></textarea>

    <select id="studentClass" required>
      <option value="">Select Class</option>

      <option>P1 Hope</option>
      <option>P1 Love</option>
      <option>P1 Peace</option>
      <option>P1 Joy</option>

      <option>P2 Love</option>
      <option>P2 Joy</option>
      <option>P2 Peace</option>

      <option>P3 Joy</option>
      <option>P3 Love</option>
      <option>P3 Peace</option>

      <option>P4 Love</option>
      <option>P4 Joy</option>

      <option>P5 Joy</option>
      <option>P5 Love</option>

      <option>P6 Joy</option>
      <option>P6 Love</option>
    </select>

    <select id="subject" required>

      <option value="">Select Subject</option>

      <option>English</option>
      <option>Math</option>
      <option>Science</option>
      <option>Chinese</option>
      <option>Thai</option>
      <option>ICT</option>
      <option>Music</option>
      <option>Art</option>
      <option>Drama</option>
      <option>Social Studies</option>

    </select>

    <input
      type="text"
      id="taggedName"
      placeholder="Tagged Student Name"
      required
    >

    <input
      type="text"
      id="teacherName"
      placeholder="Teacher Name"
      required
    >

    <label class="upload-label">
      Upload Files
    </label>

    <input
      type="file"
      id="mediaUpload"
      multiple
      accept="image/*,video/*,.pdf"
    >

    <input
      type="url"
      id="projectLink"
      placeholder="Optional Project Link"
    >

    <button type="submit">
      Upload for Approval
    </button>

  </form>

  <div class="notice">
    Uploaded student work will wait for admin approval before appearing publicly.
  </div>

</section>
